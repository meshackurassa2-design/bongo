name: Build Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Expo Prebuild
        run: npx expo prebuild -p ios --clean
        
      - name: Install CocoaPods
        run: |
          cd ios
          pod install
          
      - name: Build Unsigned App
        run: |
          cd ios
          # Ensure Xcode can find the Node.js binary installed by GitHub Actions
          echo "export NODE_BINARY=$(command -v node)" > .xcode.env.local
          
          # Force completely disable code signing for all Pods using Node.js to avoid BSD sed issues
          node -e "const fs = require('fs'); let podfile = fs.readFileSync('Podfile', 'utf8'); podfile = podfile.replace('react_native_post_install(installer)', 'react_native_post_install(installer)\\n    installer.pods_project.targets.each do |target|\\n      target.build_configurations.each do |config|\\n        config.build_settings[\\'CODE_SIGNING_ALLOWED\\'] = \\'NO\\'\\n        config.build_settings[\\'CODE_SIGNING_REQUIRED\\'] = \\'NO\\'\\n      end\\n    end'); fs.writeFileSync('Podfile', podfile);"
          
          # Re-run pod install to apply the new post-install hook
          pod install
          
          WORKSPACE=$(ls -d *.xcworkspace | head -n 1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Building Workspace: $WORKSPACE, Scheme: $SCHEME"
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release -sdk iphoneos -derivedDataPath build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" DEVELOPMENT_TEAM="" || exit 1
          
      - name: Package IPA
        run: |
          mkdir -p Payload
          mv ios/build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r bongo-stream-unsigned.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bongo-stream-unsigned-ipa
          path: bongo-stream-unsigned.ipa
